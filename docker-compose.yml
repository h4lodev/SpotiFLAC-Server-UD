name: spotiflac-custom
services:
  spotiflac:
    build: .  # <--- EKSİK OLAN SİHİRLİ SATIR BURASI (Noktayı unutma)
    image: spotiflac-server:latest
    container_name: spotiflac-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /DATA/Media/Music:/downloads
      - /DATA/Media/Music:/app/downloads 
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Istanbul